<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="utf-8"/>

  <title>Mapa</title>

  <link rel="stylesheet"
  href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <link rel="stylesheet"
  href="css/style.css">

  <style>

    #map{
      height:100vh;
      background:black;
    }

    /* HUD */

    #hud{

      position:absolute;

      top:20px;

      right:20px;

      z-index:999;

      background:rgba(0,0,0,0.7);

      border:1px solid #333;

      border-radius:12px;

      padding:20px;

      width:220px;

      backdrop-filter:blur(10px);
    }

    #hud div{

      margin-bottom:12px;

      font-size:18px;
    }

    /* POPUPS */

    .leaflet-popup-content-wrapper{
      background:#000 !important;
      color:#fff !important;
      border:1px solid #333;
    }

    .leaflet-popup-tip{
      background:#000 !important;
    }

    .popup-box{
      font-size:13px;
      line-height:1.6;
    }

    .popup-title{
      font-weight:bold;
      margin-bottom:6px;
      font-size:15px;
    }

    .stars{
      font-size:22px;
      color:gold;
      letter-spacing:3px;
      display:block;
      margin-top:2px;
    }

  </style>

</head>

<body>

<button class="back-btn"
onclick="location.href='index.html'">

Volver

</button>

<!-- HUD -->

<div id="hud">

  <div id="hud-day">
    Día 1
  </div>

  <div id="hud-time">
    00:00
  </div>

  <div id="hud-weather">
    Cielo despejado
  </div>

  <div id="hud-cycle">
    ☀️ Día
  </div>

</div>

<!-- MAPA -->

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* FECHA INICIO */

const inicio =
new Date("2026-05-22T00:00:00");

/* ACTUALIZAR HUD */

function actualizarHUD(){

  const ahora =
  new Date();

  /* HORA CHILE */

  const chile =
  new Date(

    ahora.toLocaleString(
      "en-US",
      {
        timeZone:
        "America/Santiago"
      }
    )

  );

  /* HORA */

  let horas =
  chile.getHours()
  .toString()
  .padStart(2,"0");

  let minutos =
  chile.getMinutes()
  .toString()
  .padStart(2,"0");

  document
  .getElementById("hud-time")
  .innerText =
  `${horas}:${minutos}`;

  /* DIA */

  const diferencia =
  chile - inicio;

  const dias =
  Math.floor(
    diferencia /
    (1000*60*60*24)
  ) + 1;

  document
  .getElementById("hud-day")
  .innerText =
  `Día ${dias}`;

  /* DIA/NOCHE */

  if(horas >= 8 && horas < 20){

    document
    .getElementById("hud-cycle")
    .innerText =
    "☀️ Día";

  }else{

    document
    .getElementById("hud-cycle")
    .innerText =
    "🌙 Noche";
  }

  /* CLIMA */

  document
  .getElementById("hud-weather")
  .innerText =
  "Cielo despejado";
}

actualizarHUD();

setInterval(
  actualizarHUD,
  1000
);

/* ========================= */
/* MAPA */
/* ========================= */

var bounds =
[[-500,-500],[3200,3200]];

var map = L.map('map', {

  crs:L.CRS.Simple,

  minZoom:-4,

  maxZoom:4,

  maxBounds:bounds,

  maxBoundsViscosity:1.0
});

/* IMAGEN MAPA */

L.imageOverlay(
'mapa.png',
bounds
).addTo(map);

map.fitBounds(bounds);

/* ========================= */
/* ICONO */
/* ========================= */

var redIcon = new L.Icon({

  iconUrl:
  'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',

  shadowUrl:
  'https://unpkg.com/leaflet/dist/images/marker-shadow.png',

  iconSize:[25,41],

  iconAnchor:[12,41]
});

/* ========================= */
/* ESTRELLAS */
/* ========================= */

function estrellas(n){

  return `
  
    <span class="stars">

      ${"★".repeat(n)}
      ${"☆".repeat(5-n)}

    </span>
  
  `;
}

/* ========================= */
/* POPUP */
/* ========================= */

function crearPopup(l){

  return `
  
    <div class="popup-box">

      <div class="popup-title">
        ${l.nombre}
      </div>

      ➤ Estado de saqueo:<br>
      ${l.saqueo}%<br><br>

      ➤ Descripción:
      ${l.descripcion}<br><br>

      ➤ Dificultad:<br>

      ${estrellas(l.dificultad)}

    </div>
  
  `;
}

/* ========================= */
/* FLECHAS */
/* ========================= */

function popupFlecha(nombre){

  return `
  
    <div class="popup-box">

      <div class="popup-title">
        ${nombre}
      </div>

      <button style="
        background:#111;
        border:1px solid #444;
        color:#888;
        padding:6px 10px;
        cursor:not-allowed;
      " disabled>

        No disponible aún

      </button>

    </div>
  
  `;
}

/* ========================= */
/* CARGAR DATOS */
/* ========================= */

fetch('datos.json')

.then(r => r.json())

.then(data => {

  /* ========================= */
  /* LUGARES */
  /* ========================= */

  data.lugares.forEach(l => {

    const marker =
    L.marker(
      l.coords,
      {icon:redIcon}
    )

    .addTo(map)

    .bindPopup(crearPopup(l));

    /* HOVER */

    marker.on('mouseover', function(){

      this._icon.style.filter =
      "drop-shadow(0 0 10px red) brightness(1.2)";
    });

    marker.on('mouseout', function(){

      this._icon.style.filter =
      "";
    });

  });

  /* ========================= */
  /* FLECHAS */
  /* ========================= */

  data.flechas.forEach(f => {

    const marker =
    L.marker(
      f.coords,
      {icon:redIcon}
    )

    .addTo(map)

    .bindPopup(popupFlecha(f.nombre));

    /* HOVER */

    marker.on('mouseover', function(){

      this._icon.style.filter =
      "drop-shadow(0 0 10px red) brightness(1.2)";
    });

    marker.on('mouseout', function(){

      this._icon.style.filter =
      "";
    });

  });

});

</script>

</body>
</html>
