<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <title>Horizon Academy</title>

  <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- VIDEO FONDO -->

<video id="background-video"
autoplay
loop
playsinline>

  <source
  src="img/rain.mp4"
  type="video/mp4">

</video>

<!-- CAPA OSCURA -->

<div id="background-overlay"></div>

<!-- INTRO -->

<div id="intro">

  <div id="intro-text">

    <p class="fade-text">
      No hubo advertencias.
    </p>

    <p class="fade-text">
      Solo caos.
    </p>

    <p class="fade-text">
      Y una academia.
    </p>

  </div>

</div>

<!-- MENU -->

<div class="main-menu hidden"
id="mainMenu">

  <h1>HORIZON ACADEMY</h1>

  <button
  onclick="location.href='personajes.html'">

    PERSONAJES

  </button>

  <button
  onclick="location.href='mapa.html'">

    MAPA

  </button>

</div>

<script>

/* DESAPARECER INTRO */

setTimeout(() => {

  document
  .getElementById("intro")
  .classList.add("hide-intro");

}, 7000);

/* MOSTRAR MENU */

setTimeout(() => {

  document
  .getElementById("mainMenu")
  .classList.remove("hidden");

}, 8500);

</script>

</body>
</html>
