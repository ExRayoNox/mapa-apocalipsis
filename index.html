<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <title>Horizon Academy</title>

  <link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- FONDO / INTRO -->

<div id="intro" class="background-layer">

  <!-- VIDEO -->

  <video id="intro-video"
  autoplay
  loop
  playsinline>

    <source
    src="img/rain.mp4"
    type="video/mp4">

  </video>

  <!-- OVERLAY -->

  <div id="intro-overlay"></div>

  <!-- TEXTO INTRO -->

  <div id="intro-text">

    <p class="fade-text">
      No hubo advertencias.
    </p>

    <p class="fade-text">
      Solo caos.
    </p>

    <p class="fade-text">
      Y una academia.
    </p>

  </div>

</div>

<!-- MENU -->

<div class="main-menu hidden"
id="mainMenu">

  <h1>HORIZON ACADEMY</h1>

  <button
  onclick="location.href='personajes.html'">

    PERSONAJES

  </button>

  <button
  onclick="location.href='mapa.html'">

    MAPA

  </button>

</div>

<script>

/* DESAPARECER TEXTO */

setTimeout(() => {

  document
  .getElementById("intro-text")
  .style.opacity = "0";

}, 7000);

/* MOSTRAR MENU */

setTimeout(() => {

  document
  .getElementById("mainMenu")
  .classList.remove("hidden");

}, 8500);

</script>

</body>
</html>
